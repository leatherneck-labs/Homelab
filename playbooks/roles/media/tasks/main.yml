- name: Ensure plex directory exists
  file:
    path: /opt/plex
    state: directory
    owner: "{{ hostvars['localhost'].deploy_user }}"
    group: "{{ hostvars['localhost'].deploy_user }}"
    mode: '0755'

- name: Deploy plex docker-compose template
  template:
    src: docker-compose.yml.j2
    dest: /opt/plex/docker-compose.yml
    owner: "{{ hostvars['localhost'].deploy_user }}"
    group: "{{ hostvars['localhost'].deploy_user }}"
    mode: '0644'

- name: Start plex container
  community.docker.docker_compose_v2:
    project_src: /opt/plex
    state: present
