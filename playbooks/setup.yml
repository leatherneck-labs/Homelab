- name: Prompt for SSH user and pihole password
  hosts: localhost
  gather_facts: false
  connection: local
  vars_prompt:
    - name: deploy_user
      prompt: "Enter the SSH user for target hosts"
      private: no
    - name: pihole_password
      prompt: "Enter the admin password for pihole"
      private: yes
  tasks:
    - name: Set deploy_user and pihole_password as facts for other plays
      set_fact:
        deploy_user: "{{ deploy_user }}"
        pihole_password: "{{ pihole_password }}"

- name: Bootstrap base packages as root
  hosts: all
  remote_user: "{{ hostvars['localhost'].deploy_user }}"
  become: true
  become_method: su
  roles:
    - base
    - users

- name: Network host setup
  hosts: network
  remote_user: "{{ hostvars['localhost'].deploy_user }}"
  become: true
  become_method: "{{ become_method_setting | default('sudo') }}"
  vars:
    pihole_password: "{{ hostvars['localhost'].pihole_password }}"
  roles:
    - docker_apps
    - network

- name: Media host setup
  hosts: media
  remote_user: "{{ hostvars['localhost'].deploy_user }}"
  become: true
  become_method: "{{ become_method_setting | default('sudo') }}"
  roles:
    - docker_apps
    - media
